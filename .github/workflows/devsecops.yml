name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: secnotes-app
  K8S_NAMESPACE: secnotes
  APP_URL: http://192.168.59.100:30080

jobs:

  unit_tests:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install deps and run tests
        run: |
          npm install
          npm test -- --coverage --forceExit --testTimeout=30000
        continue-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  sonarqube_scan:
    name: SAST - SonarQube
    runs-on: self-hosted
    needs: unit_tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SecNotes
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  docker_build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: unit_tests
    steps:
      - uses: actions/checkout@v4
      - name: Build image inside minikube Docker daemon
        run: |
          # Export minikube docker env variables explicitly
          export DOCKER_TLS_VERIFY=$(minikube docker-env | grep DOCKER_TLS_VERIFY | cut -d'"' -f2)
          export DOCKER_HOST=$(minikube docker-env | grep DOCKER_HOST | cut -d'"' -f2)
          export DOCKER_CERT_PATH=$(minikube docker-env | grep DOCKER_CERT_PATH | cut -d'"' -f2)
          export MINIKUBE_ACTIVE_DOCKERD=$(minikube docker-env | grep MINIKUBE_ACTIVE_DOCKERD | cut -d'"' -f2)

          echo "Docker host: $DOCKER_HOST"
          docker build -t $DOCKER_IMAGE:latest .
          docker images | grep $DOCKER_IMAGE

  k8s_deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: docker_build
    steps:
      - uses: actions/checkout@v4
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply --validate=false -f k8s/namespace.yaml
          kubectl apply --validate=false -f k8s/configmap.yaml -n $K8S_NAMESPACE
          kubectl apply --validate=false -f k8s/secret.yaml -n $K8S_NAMESPACE
          kubectl apply --validate=false -f k8s/deployment.yaml -n $K8S_NAMESPACE
          kubectl apply --validate=false -f k8s/service.yaml -n $K8S_NAMESPACE
      - name: Wait for rollout
        run: kubectl rollout status deployment/secnotes-app -n $K8S_NAMESPACE --timeout=120s
      - name: Show deployed resources
        run: |
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get svc -n $K8S_NAMESPACE

  dast_zap:
    name: DAST - OWASP ZAP
    runs-on: self-hosted
    needs: k8s_deploy
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Verify app is reachable
        run: curl -f $APP_URL

      - name: Pull OWASP ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Create ZAP output directory
        run: mkdir -p zap-reports

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t $APP_URL \
            -r zap-report.html \
            -J zap-report.json \
            -I
        continue-on-error: true

      - name: Show ZAP summary
        if: always()
        run: |
          if [ -f zap-reports/zap-report.json ]; then
            cat zap-reports/zap-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          sites = data.get('site', [])
          for site in sites:
              alerts = site.get('alerts', [])
              for alert in alerts:
                  risk = alert.get('riskdesc', 'Unknown')
                  name = alert.get('name', 'Unknown')
                  count = alert.get('count', 0)
                  print(f'  [{risk}] {name} ({count} instances)')
          "
          fi

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap-reports/
          retention-days: 7
