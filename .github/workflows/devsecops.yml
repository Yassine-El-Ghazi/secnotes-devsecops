name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: secnotes-app
  K8S_NAMESPACE: secnotes

jobs:

  unit_tests:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install deps and run tests
        run: |
          npm install
          npm test -- --coverage --forceExit --testTimeout=30000
        continue-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  sonarqube_scan:
    name: SAST - SonarQube
    runs-on: self-hosted
    needs: unit_tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SecNotes
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  docker_build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: unit_tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.sha }} .
          docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest
          docker images | grep $DOCKER_IMAGE

  k8s_deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: docker_build
    steps:
      - uses: actions/checkout@v4
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml -n $K8S_NAMESPACE
          kubectl apply -f k8s/secret.yaml -n $K8S_NAMESPACE
          kubectl apply -f k8s/deployment.yaml -n $K8S_NAMESPACE
          kubectl apply -f k8s/service.yaml -n $K8S_NAMESPACE
      - name: Wait for rollout
        run: kubectl rollout status deployment/secnotes-app -n $K8S_NAMESPACE --timeout=120s
      - name: Show deployed resources
        run: |
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get svc -n $K8S_NAMESPACE
